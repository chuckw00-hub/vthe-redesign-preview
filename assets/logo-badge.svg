<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Vermont Herbal Essentials">
  <defs>
    <path id="vhe-top" d="M 56 200 A 144 144 0 0 1 344 200" />
    <path id="vhe-bot" d="M 64 200 A 136 136 0 0 0 336 200" />
  </defs>
  <circle cx="200" cy="200" r="196" fill="#BE9B57"/>
  <circle cx="200" cy="200" r="172" fill="none" stroke="#06283C" stroke-width="5"/>
  <g fill="#06283C" font-family="'Oswald','Arial Narrow',sans-serif" font-weight="600">
    <text font-size="58" letter-spacing="3" text-anchor="middle">
      <textPath href="#vhe-top" startOffset="50%">VERMONT</textPath>
    </text>
    <text font-size="33" letter-spacing="5" text-anchor="middle">
      <textPath href="#vhe-bot" startOffset="50%">HERBAL ESSENTIALS</textPath>
    </text>
  </g>
  <!-- center: 8-point spark (cannabis leaf as a radiant burst) on a stem -->
  <g fill="#06283C" transform="translate(200 180)">
    <g>
      <polygon points="0,-58 9,-14 -9,-14"/>
      <polygon points="0,58 9,14 -9,14"/>
      <polygon points="-58,0 -14,9 -14,-9"/>
      <polygon points="58,0 14,9 14,-9"/>
      <polygon points="-41,-41 -7,-4 -4,-7"/>
      <polygon points="41,-41 4,-7 7,-4"/>
      <polygon points="-41,41 -4,7 -7,4"/>
      <polygon points="41,41 7,4 4,7"/>
    </g>
    <circle cx="0" cy="0" r="13"/>
    <!-- stem dropping toward a simple pinch -->
    <rect x="-3" y="48" width="6" height="38"/>
    <circle cx="0" cy="92" r="9"/>
  </g>
</svg>
